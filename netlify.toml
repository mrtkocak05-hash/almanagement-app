[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api/* requests to the Render backend
# REPLACE the URL below with your actual Render service URL after backend is deployed
[[redirects]]
  from = "/api/*"
  to = "https://almanagement-backend.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
