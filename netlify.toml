[build]
  command = "npm run build && cd backend && npm install --omit=dev"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

# Route /api/* to the serverless Express function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
